server:
  addr: ":8080"

database:
  path: "data/biligo.db"

auth:
  # Panel password. Leave empty to generate and write one on server startup.
  password: ""

logging:
  # Available levels: info, warn, error. Use "none" to disable application logs.
  levels:
    - info
    - warn
    - error
  # Console color mode: auto, always, never.
  color: auto
  file:
    # Write application logs to a file.
    enabled: false
    path: "logs/biligo.log"
